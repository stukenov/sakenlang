<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            width: 1280px;
            height: 640px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A84FF, #5E5CE6);
            font-family: 'Inter', system-ui, sans-serif;
            color: #fff;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .title {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 24px;
            opacity: 0.9;
            max-width: 600px;
        }
        .subtitle {
            font-size: 16px;
            opacity: 0.7;
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="logo">S</div>
    <div class="title">sakenlang</div>
    <div class="tagline">From hello world to web apps. One language.</div>
    <div class="subtitle">A modern teaching language for CS courses</div>
</body>
</html>
